<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Temple Crowd Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background: #fdf6ec; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #b5651d; }
    .navbar-brand { color: #fff !important; font-weight: bold; }
    .nav-link-custom { color: #fff !important; text-decoration: none; margin-right: 15px; }
    .nav-link-custom:hover { text-decoration: underline; }
    .admin-badge { background: #b5651d; color: #fff; font-size: 0.75rem; padding: 2px 10px; border-radius: 10px; margin-left: 8px; }
    .card { border: none; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
</style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    <span class="navbar-brand">🛕 Pilgrimage Crowd Management System</span>
    <div>
        <a href="/" class="nav-link-custom">Dashboard</a>
        <a href="/map" class="nav-link-custom">Map View</a>
        <a href="/admin" class="nav-link-custom"><u>Admin Panel</u></a>
        <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
  </div>
</nav>

<div class="container">
    <h4 class="mb-1">Admin Panel <span class="admin-badge">Admin only — {{ user }}</span></h4>
    <p class="text-muted mb-4">Update base footfall and capacity used in crowd predictions.</p>

    {% if message %}
    <div class="alert alert-success py-2">{{ message }}</div>
    {% endif %}

    <div class="row">
        {% for name, t in temples.items() %}
        <div class="col-md-6 mb-4">
            <div class="card p-3">
                <h5>{{ name }}</h5>
                <p class="text-muted mb-3">{{ t.location }}</p>
                <form method="POST" action="/admin">
                    <input type="hidden" name="temple" value="{{ name }}">
                    <div class="mb-2">
                        <label class="form-label mb-1">Base Footfall (normal day)</label>
                        <input type="number" name="base_footfall" class="form-control" value="{{ t.base_footfall }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label mb-1">Capacity (max safe limit)</label>
                        <input type="number" name="capacity" class="form-control" value="{{ t.capacity }}" required>
                    </div>
                    <button type="submit" class="btn btn-warning btn-sm">Update {{ name }}</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
