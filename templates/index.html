<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Temple Crowd Management Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background: #fdf6ec; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #b5651d; }
    .navbar-brand { color: #fff !important; font-weight: bold; }
    .card { border: none; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); }
    .status-badge { font-size: 0.9rem; padding: 6px 14px; border-radius: 20px; color: #fff; }
    .green { background-color: #2e7d32; }
    .yellow { background-color: #f9a825; }
    .red { background-color: #c62828; }
    .temple-icon { font-size: 2rem; }
    footer { margin-top: 40px; padding: 15px; text-align: center; color: #777; }
</style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    <span class="navbar-brand" data-i18n="title">🛕 Pilgrimage Crowd Management System</span>
    <div class="d-flex align-items-center gap-2">
        <select id="langSelect" class="form-select form-select-sm" style="width:auto;" onchange="setLanguage(this.value)">
            <option value="en">English</option>
            <option value="hi">हिन्दी</option>
            <option value="gu">ગુજરાતી</option>
            <option value="ta">தமிழ்</option>
        </select>
        <a href="/logout" class="btn btn-sm btn-outline-light" data-i18n="logout">Logout</a>
    </div>
  </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-4">
            <label class="form-label fw-bold" data-i18n="selectDate">Select Date</label>
            <input type="date" id="dateInput" class="form-control">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-warning w-100" data-i18n="checkCrowd" onclick="loadPredictions()">Check Crowd</button>
        </div>
    </div>

    <div class="row" id="templeCards">
        <!-- Cards injected here by JS -->
    </div>
</div>

<footer>
    Mini Project — CSE | Smart Crowd Management for Somnath, Dwarka, Ambaji & Pavagadh
</footer>

<script>
// ---------------------------------------------------
// Simple i18n dictionary (English, Hindi, Gujarati, Tamil)
// ---------------------------------------------------
const translations = {
    en: { title: "🛕 Pilgrimage Crowd Management System", logout: "Logout", selectDate: "Select Date",
          checkCrowd: "Check Crowd", footfall: "Predicted Footfall", capacity: "Capacity",
          crowdLevel: "Crowd Level", festival: "Festival Day", bestTime: "Best Time",
          yes: "Yes 🎉", no: "No", low: "Low", medium: "Medium", high: "High" },
    hi: { title: "🛕 तीर्थयात्रा भीड़ प्रबंधन प्रणाली", logout: "लॉगआउट", selectDate: "तारीख चुनें",
          checkCrowd: "भीड़ जांचें", footfall: "अनुमानित भीड़", capacity: "क्षमता",
          crowdLevel: "भीड़ स्तर", festival: "उत्सव दिन", bestTime: "सबसे अच्छा समय",
          yes: "हाँ 🎉", no: "नहीं", low: "कम", medium: "मध्यम", high: "अधिक" },
    gu: { title: "🛕 યાત્રાધામ ભીડ વ્યવસ્થાપન સિસ્ટમ", logout: "લૉગઆઉટ", selectDate: "તારીખ પસંદ કરો",
          checkCrowd: "ભીડ તપાસો", footfall: "અંદાજિત ભીડ", capacity: "ક્ષમતા",
          crowdLevel: "ભીડ સ્તર", festival: "તહેવારનો દિવસ", bestTime: "શ્રેષ્ઠ સમય",
          yes: "હા 🎉", no: "ના", low: "ઓછી", medium: "મધ્યમ", high: "વધારે" },
    ta: { title: "🛕 யாத்திரை கூட்ட மேலாண்மை அமைப்பு", logout: "வெளியேறு", selectDate: "தேதியைத் தேர்ந்தெடு",
          checkCrowd: "கூட்டத்தை பார்", footfall: "எதிர்பார்க்கும் கூட்டம்", capacity: "கொள்ளளவு",
          crowdLevel: "கூட்ட நிலை", festival: "விழா நாள்", bestTime: "சிறந்த நேரம்",
          yes: "ஆம் 🎉", no: "இல்லை", low: "குறைவு", medium: "நடுத்தரம்", high: "அதிகம்" }
};

let currentLang = 'en';

function setLanguage(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) el.textContent = translations[lang][key];
    });
    loadPredictions(); // reload cards so card text updates too
}

function levelText(level) {
    const t = translations[currentLang];
    if (level === 'Low') return t.low;
    if (level === 'Medium') return t.medium;
    return t.high;
}

async function loadPredictions() {
    const date = document.getElementById('dateInput').value;
    if (!date) { alert('Please select a date'); return; }

    const res = await fetch(`/predict_all?date=${date}`);
    const data = await res.json();
    const t = translations[currentLang];

    const container = document.getElementById('templeCards');
    container.innerHTML = '';

    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'col-md-3 mb-4';
        card.innerHTML = `
            <div class="card p-3 text-center">
                <div class="temple-icon">🛕</div>
                <h5 class="mt-2">${item.temple}</h5>
                <p class="text-muted mb-1">${item.location}</p>
                <span class="status-badge ${item.color}">${levelText(item.crowd_level)} — ${item.crowd_percentage}%</span>
                <p class="mt-3 mb-1"><strong>${t.footfall}:</strong> ${item.predicted_footfall} / ${item.capacity}</p>
                <p class="mb-1"><strong>${t.festival}:</strong> ${item.is_festival ? t.yes : t.no}</p>
                <p class="mb-0"><strong>${t.bestTime}:</strong><br>${item.best_time_slots.join(' / ')}</p>
            </div>
        `;
        container.appendChild(card);
    });
}

// Auto-load for today's date on page load
window.onload = () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').value = today;
    loadPredictions();
};
</script>

</body>
</html>
