<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Temple Crowd Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background: linear-gradient(135deg, #fdf6ec, #f3d9a4);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
        background: #fff;
        border-radius: 16px;
        padding: 40px 35px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        width: 100%;
        max-width: 380px;
    }
    .login-card h2 { color: #b5651d; font-weight: bold; text-align: center; margin-bottom: 5px; }
    .login-card p.sub { text-align: center; color: #888; margin-bottom: 25px; }
    .btn-login { background: #b5651d; color: #fff; border: none; }
    .btn-login:hover { background: #93511a; color: #fff; }
    .temple-emoji { text-align: center; font-size: 2.5rem; }
    .hint { font-size: 0.8rem; color: #999; text-align: center; margin-top: 15px; }
</style>
</head>
<body>

<div class="login-card">
    <div class="temple-emoji">🛕</div>
    <h2>Pilgrimage Crowd System</h2>
    <p class="sub">Login to view crowd predictions</p>

    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-login w-100">Login</button>
    </form>

    <p class="hint">Demo login → username: <b>admin</b> / password: <b>admin123</b></p>
</div>

</body>
</html>
