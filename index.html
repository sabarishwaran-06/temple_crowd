<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Temple Crowd Management Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background: #fdf6ec; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #b5651d; }
    .navbar-brand { color: #fff !important; font-weight: bold; }
    .card { border: none; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); }
    .status-badge { font-size: 0.9rem; padding: 6px 14px; border-radius: 20px; color: #fff; }
    .green { background-color: #2e7d32; }
    .yellow { background-color: #f9a825; }
    .red { background-color: #c62828; }
    .temple-icon { font-size: 2rem; }
    footer { margin-top: 40px; padding: 15px; text-align: center; color: #777; }
</style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand">🛕 Pilgrimage Crowd Management System</span>
  </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-4">
            <label class="form-label fw-bold">Select Date</label>
            <input type="date" id="dateInput" class="form-control">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-warning w-100" onclick="loadPredictions()">Check Crowd</button>
        </div>
    </div>

    <div class="row" id="templeCards">
        <!-- Cards injected here by JS -->
    </div>
</div>

<footer>
    Mini Project — CSE | Smart Crowd Management for Somnath, Dwarka, Ambaji & Pavagadh
</footer>

<script>
async function loadPredictions() {
    const date = document.getElementById('dateInput').value;
    if (!date) { alert('Please select a date'); return; }

    const res = await fetch(`/predict_all?date=${date}`);
    const data = await res.json();

    const container = document.getElementById('templeCards');
    container.innerHTML = '';

    data.forEach(t => {
        const card = document.createElement('div');
        card.className = 'col-md-3 mb-4';
        card.innerHTML = `
            <div class="card p-3 text-center">
                <div class="temple-icon">🛕</div>
                <h5 class="mt-2">${t.temple}</h5>
                <p class="text-muted mb-1">${t.location}</p>
                <span class="status-badge ${t.color}">${t.crowd_level} Crowd</span>
                <p class="mt-3 mb-1"><strong>Predicted Footfall:</strong> ${t.predicted_footfall}</p>
                <p class="mb-1"><strong>Festival Day:</strong> ${t.is_festival ? 'Yes 🎉' : 'No'}</p>
                <p class="mb-0"><strong>Best Time:</strong><br>${t.best_time_slots.join(' / ')}</p>
            </div>
        `;
        container.appendChild(card);
    });
}

// Auto-load for today's date on page load
window.onload = () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').value = today;
    loadPredictions();
};
</script>

</body>
</html>
